name: Feature request
description: Propose a new user-facing capability or improvement.
title: "[Feature]: "
labels: ["feature", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for new capabilities or notable product improvements.
        Please focus on user problem, scope, and acceptance criteria.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What user problem does this solve?
      placeholder: "Users cannot easily see final network + protocol costs before swap confirmation."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the expected behavior and UI/API changes at a high level.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in scope and out of scope for the first implementation?
      placeholder: |
        In scope:
        - ...
        Out of scope:
        - ...
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Concrete checks that define done.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Optional. Mention alternatives and tradeoffs.

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I understand this should be discussed in an issue before opening a PR.
          required: true
